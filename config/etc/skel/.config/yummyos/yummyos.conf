# YummyOS Configuration File
# /etc/yummyos/yummyos.conf
#
# This is the central configuration file for YummyOS system utilities.
# Settings here can be overridden per-user in ~/.config/yummyos/yummyos.conf

# === General ===
# YummyOS version identifier (read-only, managed by the system)
version = 1.0.0
codename = Custard

# === Theme ===
# Global theme: defaults to YummyOS Dark or Light
# Options: YummyOS-Dark, YummyOS-Light, Breeze-Dark, Breeze-Light, YummyOS-Default
theme = YummyOS-Dark

# Accent color applied system-wide
# Options: blue, teal, green, orange, red, purple, pink, yellow, cyan, default
accent_color = blue

# Cursor theme
# Options: YummyOS-Cursors, Breeze, Breeze-Dark, Adwaita
cursor_theme = YummyOS-Cursors

# Icon theme
# Options: YummyOS, Breeze, Papirus, Numix
icon_theme = YummyOS

# Font family for UI elements
font_family = Noto Sans

# Font size adjustment (0.8 to 1.5, 1.0 is default)
font_size_adjust = 1.0

# Enable transparency effects in panels and windows
enable_transparency = true

# Enable window decorations (title bar buttons)
enable_window_decorations = true

# Wallpaper path (leave empty for default)
wallpaper = /usr/share/wallpapers/YummyOS/contents/images/default.png

# === Performance ===
# Performance profile: powersave, balanced, performance, custom
performance_profile = balanced

# Enable automatic profile switching based on power source
auto_profile_switch = true

# CPU governor for performance profile (when applicable)
# Options: powersave, performance, schedutil, ondemand
cpu_governor = schedutil

# Enable GPU power management
gpu_power_management = true

# Disable screen blanking when on AC power
disable_screen_blank_ac = false

# === Privacy ===
# Enable telemetry data collection (opt-in)
telemetry_enabled = false

# Telemetry reporting frequency in hours (0 = disabled)
telemetry_interval = 24

# Enable crash reporting (opt-in)
crash_reporting = false

# Collect usage statistics for improvement
usage_statistics = false

# Allow anonymous usage data to improve YummyOS
anonymous_analytics = false

# === Backup ===
# Backup storage directory
backup_directory = /var/backups/yummyos

# Maximum number of backups to retain (0 = unlimited)
backup_max_count = 10

# Enable automatic backups
backup_automatic = false

# Automatic backup frequency in hours
backup_frequency = 168

# Include user configuration files in backups
backup_include_configs = true

# Include installed packages list in backups
backup_include_packages = true

# === Networking ===
# Enable NetworkManager integration
network_manager = true

# Enable mDNS/Bonjour discovery
mdns_enabled = true

# DNS resolver (system default or custom)
dns_resolver = system

# === System Updates ===
# Enable automatic update checks
auto_update_check = true

# Update check interval in hours
update_check_interval = 24

# Notify about available updates
notify_updates = true

# Prefer LTS packages when available
prefer_lts = false

# === Welcome ===
# Show welcome dialog on first login
show_welcome = true

# Welcome dialog has been shown (managed by the system)
welcome_shown = false

# === Display ===
# Enable fractional scaling
fractional_scaling = false

# Night light enabled (blue light filter)
night_light_enabled = false

# Night light schedule start (24h format)
night_light_start = 20:00

# Night light schedule end (24h format)
night_light_end = 07:00

# Night light color temperature (1700-4700K)
night_light_temperature = 2700

# === Accessibility ===
# Enable high contrast theme option
high_contrast = false

# Enable reduced motion (animations)
reduced_motion = false

# Enable screen reader integration
screen_reader = false

# Large text scaling factor (1.0 = normal, up to 2.0)
text_scaling_factor = 1.0

# === Sound ===
# System sound theme
sound_theme = freedesktop

# Enable startup sound
startup_sound = false

# Enable notification sounds
notification_sounds = true
