# /etc/NetworkManager/NetworkManager.conf - YummyOS NetworkManager configuration

[main]
plugins=keyfile
dns=systemd-resolved
systemd-resolved=true
systemd-networkd=false
no-auto-default=*

# Use DHCP override for all interfaces
#dhcp=dhclient

[logging]
level=INFO
audit=false

[connection]
# Default connection settings
wifi.cloned-mac-address=random
ethernet.cloned-mac-address=random

[device]
wifi.scan-rand-mac-address=yes
wifi.wake-on-lan=default
