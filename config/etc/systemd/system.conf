#
# Entries in this file show the compile time defaults. You can change
# settings by editing this file. Uncomment the appropriate settings to
# override them. All settings are explained in the systemd-system.conf(5)
# man page and in https://systemd.io/PORTABILITY_AND_INTERFACE_STABILITY/.
#
# YummyOS optimized system configuration

[Manager]
#DefaultTimeoutStartSec=90s
DefaultTimeoutStopSec=15s
DefaultTimeoutAbortSec=15s
DefaultRestartSec=100ms
DefaultStartLimitIntervalSec=10s
DefaultStartLimitBurst=5

# Default CPU scheduling policy
DefaultCPUShares=1024
DefaultIOWeight=100
DefaultBlockIOWeight=100
DefaultTasksMax=4096

# Watchdog
#RuntimeWatchdogSec=10s
#ShutdownWatchdogSec=10min

# Crash handling
DumpCore=no
CrashShell=no

# Status
#StatusUnitFormat=combined
ShowStatus=yes

# Log
LogLevel=info
LogTarget=journal
LogTime=no

# OOM handling
OOMScoreAdjust=-900

# System call filter
SystemCallArchitectures=native

# Environment
#DefaultEnvironment=

# Timer slack
TimerSlackNSec=1000000

# Core dumps
#ProcessSizeMax=32M

# CPU affinity
#CPUAffinity=

# NUMA policy
#NUMAPolicy=default

# Architecture
#Architecture=

# Runtime directory
RuntimeDirectoryMode=0755
